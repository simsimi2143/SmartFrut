<table class="w-full">
    <thead>
        <tr>
            <th class="text-left">Producto</th>
            <th class="text-left">Precio</th>
            <th class="text-left">Cantidad</th>
            <th class="text-left">Subtotal</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for item in carrito %}
        <tr>
            <td>{{ item.nombre }}</td>
            <td>€{{ item.precio }}</td>
            <td>
                <button class="update-cantidad text-blue-500" data-id="{{ item.producto_id }}" data-cantidad="{{ item.cantidad }}">{{ item.cantidad }}</button>
            </td>
            <td>€{{ item.subtotal }}</td>
            <td><button class="remove-item text-red-500" data-id="{{ item.producto_id }}"><i class="fas fa-trash"></i></button></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
